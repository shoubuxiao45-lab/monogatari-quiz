<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>物语系列检定 - MONOGATARI QUIZ 3.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #d20000;
            --sub: #444;
            --correct: #00ff88;
        }

        * { 
            cursor: crosshair; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Serif SC', serif;
            height: 100vh; width: 100%;
            overflow: hidden;
        }

        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--sub) 1px, transparent 1px),
                              linear-gradient(90deg, var(--sub) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.1; z-index: -1;
        }

        /* 转场黑/红屏 */
        #shutter {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: none;
            justify-content: center; align-items: center;
            font-size: 15vw; font-weight: 900;
        }

        .container {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100%; padding: 10px;
        }

        .main-card {
            border: 1px solid var(--text);
            width: 100%;
            max-width: 800px;
            height: 85vh; /* 固定高度，确保滚动有效 */
            background: rgba(0,0,0,0.95);
            position: relative;
            box-shadow: 10px 10px 0px var(--accent);
            display: flex;
            flex-direction: column;
        }

        /* 统一的屏幕容器样式 */
        .screen {
            display: none; 
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 30px 20px;
            overflow-y: auto; /* 允许在屏幕内滚动 */
            -webkit-overflow-scrolling: touch;
        }

        .active { display: flex !important; }

        /* 题目样式 */
        .q-header { margin-bottom: 20px; border-bottom: 2px solid var(--text); padding-bottom: 10px; }
        .q-num { font-size: 3rem; font-weight: 900; color: var(--accent); }
        .q-text { font-size: 1.3rem; font-weight: 700; line-height: 1.4; }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 10px; }
        .opt-btn {
            background: transparent; border: 1px solid var(--text);
            color: var(--text); padding: 15px; font-size: 1rem; font-family: inherit;
            text-align: left; transition: 0.2s;
        }
        .opt-btn:active { background: var(--accent); }

        /* 复盘详情列表 */
        .review-item {
            border-left: 3px solid var(--sub);
            margin: 15px 0;
            padding: 10px 15px;
            background: rgba(255,255,255,0.03);
            text-align: left;
        }
        .review-q { font-size: 1rem; font-weight: 900; margin-bottom: 8px; }
        .status-tag { display: inline-block; padding: 2px 8px; font-size: 0.8rem; margin-right: 10px; }
        .status-correct { background: var(--correct); color: #000; }
        .status-wrong { background: var(--accent); color: #fff; }

        .rank-name { font-size: 2.5rem; font-weight: 900; color: var(--accent); margin: 10px 0; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: var(--accent); transition: width 0.3s; z-index: 10; }

        @media (min-width: 768px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
            .q-text { font-size: 1.6rem; }
            .main-card { padding: 40px; height: 80vh; }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div id="shutter"></div>

    <div class="container">
        <div class="main-card">
            <div id="progress" class="progress-bar" style="width: 0%"></div>

            <!-- 1. 开始界面 -->
            <div id="start-screen" class="screen active" style="justify-content: center; align-items: center;">
                <div style="font-size: 1rem; opacity:0.6;">「俺は、何でもは知らない」</div>
                <h1 style="font-size: 2.2rem; margin: 10px 0;">知っていることだけ。</h1>
                <button onclick="startQuiz()" style="font-size: 2rem; padding: 15px 50px; background: transparent; color: white; border: 3px solid white; margin-top: 30px; width: 100%; max-width: 300px;">开始</button>
            </div>

            <!-- 2. 答题界面 -->
            <div id="quiz-screen" class="screen">
                <div class="q-header">
                    <span class="q-num" id="q-num">01</span>
                    <div class="q-text" id="q-text">Loading...</div>
                </div>
                <div class="options-grid" id="q-opts"></div>
            </div>

            <!-- 3. 结果复盘界面 -->
            <div id="result-screen" class="screen">
                <div style="text-align: center; border-bottom: 1px solid var(--sub); padding-bottom: 20px;">
                    <div id="score-detail" style="font-size: 1.2rem; color: var(--accent);">分析中...</div>
                    <div class="rank-name" id="rank-name">称号</div>
                    <p id="rank-desc" style="font-size: 0.9rem; opacity: 0.8;"></p>
                </div>
                
                <h3 style="margin-top: 25px; color: var(--accent);">■ 怪异调查记录详情</h3>
                <div id="review-list"></div>
                
                <button class="opt-btn" onclick="location.reload()" style="text-align: center; margin: 30px auto; width: 200px; display: block;">重新开始</button>
            </div>
        </div>
    </div>

<script>
    // 题库（保持30题）
    const questions = [
        { q: "战场原黑仪在遇到历时，失去的是什么？", a: ["感情", "体重", "声音", "记忆"], c: 1 },
        { q: "忍野忍曾经的名字，其全名开头是？", a: ["姬丝秀忒", "琪雅丝黛", "索菲亚", "露米娅"], c: 0 },
        { q: "《伪物语》中，阿良良木历给火怜刷牙是为了交换什么情报？", a: ["贝木的下落", "月火的秘密", "没有交换，是惩罚", "神原的伤势"], c: 0 },
        { q: "八九寺真宵背后的背包里，标志性的动物图案是？", a: ["蜗牛", "猫", "熊", "兔子"], c: 2 },
        { q: "忍野扇自称是谁的枢轴？", a: ["阿良良木历", "卧烟伊豆湖", "忍野咩咩", "世界本身"], c: 0 },
        { q: "羽川翼在《猫物语（白）》中出现的白虎怪异叫什么？", a: ["苛虎", "障猫", "黑虎", "白魅"], c: 0 },
        { q: "贝木泥舟在《恋物语》中对千石抚子宣称自己擅长什么魔法？", a: ["变成肉片的魔法", "让人消失的魔法", "赚钱的魔法", "恋爱的魔法"], c: 0 },
        { q: "斧乃木余接的口头禅「我以得意的表情如此说道」后来消失是因为？", a: ["她累了", "黑仪的建议", "她觉得黑历史太羞耻了", "历的吐槽"], c: 2 },
        { q: "《伤物语》中，历夺回双腿时面对的对手是？", a: ["德拉曼兹路基", "艾比索特", "奇洛金卡达", "忍野咩咩"], c: 1 },
        { q: "在《终物语》最后，历最终拯救了谁而完成了自我救赎？", a: ["忍野扇", "自己", "战场原", "羽川翼"], c: 0 },
        { q: "忍野咩咩对阿良良木历的专属称呼是？", a: ["阿良良木君", "历亲", "阿拉拉木君", "那个吸血鬼"], c: 2 },
        { q: "神原骏河在篮球部是什么职位？", a: ["队长", "王牌/前任队长", "经理", "板凳球员"], c: 1 },
        { q: "卧烟伊豆湖的经典台词是？", a: ["我无所不知", "我什么都不知道", "没有我不了解的事情", "这都是怪异的错"], c: 2 },
        { q: "千石抚子在《囮物语》中吃掉了什么变成了神？", a: ["蛇的遗骸", "符咒", "历的头发", "神酒"], c: 1 },
        { q: "阿良良木月火真实的怪异身份是？", a: ["凤凰", "杜鹃", "火鸟", "不死身"], c: 1 },
        { q: "影缝余弦战斗时绝对不会踩到的地方是？", a: ["敌人的影子", "地面", "水面", "屋顶"], c: 1 },
        { q: "贝木泥舟最讨厌的东西是什么？", a: ["钱", "虚假的东西", "无法用钱买到的东西", "战场原"], c: 2 },
        { q: "羽川翼在国中时期的发型是？", a: ["短发", "单马尾", "两条长辫子", "披肩发"], c: 2 },
        { q: "《花物语》中，神原骏河面对的对手“恶魔之手”持有者是谁？", a: ["沼地蜡花", "贝木泥舟", "忍野扇", "阿良良木历"], c: 0 },
        { q: "姬丝秀忒被夺走的左手是在谁手里？", a: ["德拉曼兹路基", "艾比索特", "奇洛金卡达", "忍野咩咩"], c: 0 },
        { q: "阿良良木历的两个妹妹所在的初中叫什么名字？", a: ["栂之木二中", "直江津高中", "北白蛇中学", "七百一中"], c: 0 },
        { q: "《续·终物语》中，镜中世界的角色性格特点是？", a: ["完全相同", "完全相反/内在显现", "失去记忆", "变成怪异"], c: 1 },
        { q: "忍野忍在不吸血的状态下，外表看起来是几岁？", a: ["6岁", "8岁", "10岁", "12岁"], c: 1 },
        { q: "战场原黑仪的文具盒里，最常用的武器是？", a: ["圆规", "订书机", "美工刀", "直尺"], c: 1 },
        { q: "老仓育最擅长的学科是？", a: ["国语", "数学", "物理", "化学"], c: 1 },
        { q: "《化物语》动画第 12 集中，历与战场原去郊外看的是？", a: ["流星雨", "夏夜大三角", "烟花", "怪异"], c: 1 },
        { q: "手折正弦的怪异专家身份是专门处理什么的？", a: ["不死身怪异", "玩偶/付丧神", "欺诈师", "吸血鬼"], c: 1 },
        { q: "阿良良木历在《终物语》中提到的“欧拉”是指谁？", a: ["忍野扇", "老仓育", "数学老师", "羽川翼"], c: 1 },
        { q: "《物语系列》的小说原作者是谁？", a: ["西尾维新", "新房昭之", "渡边明夫", "虚渊玄"], c: 0 },
        { q: "阿良良木历最后考上的大学专业是？", a: ["数学系", "文学系", "法学院(警察官)", "物理系"], c: 2 }
    ];

    let current = 0;
    let score = 0;
    let userAnswers = [];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq, dur) {
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = freq;
            osc.type = 'square';
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        } catch(e) {}
    }

    function showShutter(text, color, callback) {
        const s = document.getElementById('shutter');
        s.style.display = 'flex';
        s.style.background = color;
        s.style.color = (color === '#d20000') ? '#000' : '#fff';
        s.innerText = text;
        playTone((color === '#d20000') ? 150 : 100, 0.2);
        setTimeout(() => { s.style.display = 'none'; if(callback) callback(); }, 1200);
    }

    function startQuiz() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('start-screen').classList.remove('active');
        showShutter('黒齣', '#000', () => {
            document.getElementById('quiz-screen').classList.add('active');
            updateQuestion();
        });
    }

    function updateQuestion() {
        const q = questions[current];
        document.getElementById('q-num').innerText = (current + 1).toString().padStart(2, '0');
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('progress').style.width = (current / questions.length * 100) + '%';
        
        const opts = document.getElementById('q-opts');
        opts.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(i);
            opts.appendChild(btn);
        });
        document.getElementById('quiz-screen').scrollTop = 0;
    }

    function handleAnswer(i) {
        userAnswers.push(i);
        if(i === questions[current].c) score++;
        current++;
        
        if(current < questions.length) {
            const tag = (Math.random() > 0.5) ? '赤齣' : '黑齣';
            showShutter(tag, (tag === '赤齣' ? '#d20000' : '#000'), updateQuestion);
        } else {
            showShutter('完', '#d20000', showResult);
        }
    }

    function showResult() {
        // 隐藏答题屏，激活结果屏
        document.getElementById('quiz-screen').classList.remove('active');
        const resScreen = document.getElementById('result-screen');
        resScreen.classList.add('active');
        
        document.getElementById('score-detail').innerText = `正解数: ${score} / ${questions.length}`;
        
        const rank = document.getElementById('rank-name');
        const desc = document.getElementById('rank-desc');
        const ratio = score / questions.length;

        if(ratio === 1) { rank.innerText = "怪异之王"; desc.innerText = "你是真正的专家。忍野咩咩会把他的夏威夷衬衫传给你。"; }
        else if(ratio >= 0.8) { rank.innerText = "全知的班长"; desc.innerText = "「我不是无所不知，我只是恰好知道而已。」"; }
        else if(ratio >= 0.5) { rank.innerText = "火炎姐妹"; desc.innerText = "充满了正义感但还有些不成熟。"; }
        else { rank.innerText = "贝木的饵食"; desc.innerText = "你完全被假货骗了！建议重新补番。"; }

        // 渲染列表
        const list = document.getElementById('review-list');
        list.innerHTML = '';
        questions.forEach((q, idx) => {
            const uIdx = userAnswers[idx];
            const isCorrect = uIdx === q.c;
            const item = document.createElement('div');
            item.className = 'review-item';
            item.innerHTML = `
                <div class="review-q">${idx + 1}. ${q.q}</div>
                <div>
                    <span class="status-tag ${isCorrect ? 'status-correct' : 'status-wrong'}">${isCorrect ? '正解' : '不正解'}</span>
                    你的答案: ${q.a[uIdx]}
                    ${!isCorrect ? `<br><span style="color:var(--correct); font-size:0.9rem;">正确答案: ${q.a[q.c]}</span>` : ''}
                </div>
            `;
            list.appendChild(item);
        });
    }
</script>
</body>
</html>
