<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物语系列检定 - 終物語・完</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap');

        :root {
            --bg: #000;
            --text: #fff;
            --accent: #d20000;
            --gray: #1a1a1a;
        }

        * { cursor: crosshair !important; }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 动态背景文字 */
        .bg-text {
            position: absolute;
            font-size: 8vw;
            color: rgba(255,255,255,0.03);
            white-space: nowrap;
            z-index: -1;
            animation: move 20s linear infinite;
        }

        @keyframes move {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        /* 物语标志性闪烁卡片 */
        #flash-card {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-size: 5rem;
            letter-spacing: 20px;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border: 15px solid var(--text);
            transition: all 0.1s;
        }

        h1 {
            font-size: 3.5rem;
            border-bottom: 8px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 50px;
            text-shadow: 5px 5px 0px var(--accent);
        }

        .quiz-box {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .question-num {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 2rem;
            margin-bottom: 40px;
            line-height: 1.4;
            min-height: 100px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .opt-btn {
            background: transparent;
            border: 2px solid var(--text);
            color: var(--text);
            padding: 20px;
            font-size: 1.2rem;
            font-family: inherit;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
        }

        .opt-btn:hover {
            background: var(--text);
            color: var(--bg);
            transform: scale(1.02);
        }

        .start-screen, .result-screen {
            text-align: center;
        }

        .quote {
            font-size: 1.2rem;
            font-style: italic;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .btn-large {
            padding: 20px 60px;
            font-size: 2rem;
            background: var(--accent);
            color: white;
            border: none;
            box-shadow: 10px 10px 0px white;
        }

        .btn-large:hover {
            transform: translate(-5px, -5px);
            box-shadow: 15px 15px 0px white;
        }

        /* 结果等级 */
        .rank {
            font-size: 4rem;
            color: var(--accent);
            margin: 20px 0;
            text-decoration: underline;
        }

        #warning-bar {
            position: fixed;
            bottom: 0; width: 100%;
            background: var(--accent);
            color: #fff;
            font-size: 0.8rem;
            padding: 5px;
            text-align: center;
            letter-spacing: 10px;
        }
    </style>
</head>
<body>

    <div class="bg-text" style="top:10%">MONOGATARI SERIES 物語系列 </div>
    <div class="bg-text" style="top:50%; animation-delay: -10s;">鉄血にして熱血にして冷血の吸血鬼</div>
    <div class="bg-text" style="top:80%; animation-delay: -5s;">阿良々木暦 戦場ヶ原ひたぎ</div>

    <div id="flash-card"></div>

    <div class="container">
        <!-- 开始页面 -->
        <div id="start-page" class="start-screen">
            <div class="quote">“我不是无所不知，我只是恰好知道。”</div>
            <h1>物语系列・全知识检定</h1>
            <button class="btn-large" onclick="initQuiz()">测 试 开 始</button>
        </div>

        <!-- 答题页面 -->
        <div id="quiz-page" class="quiz-box" style="display:none;">
            <div class="question-num" id="q-idx">01</div>
            <div class="question-text" id="q-text">Loading...</div>
            <div class="options-grid" id="q-opts"></div>
        </div>

        <!-- 结果页面 -->
        <div id="result-page" class="result-screen" style="display:none;">
            <h2>检定结果报告</h2>
            <div id="score-val" style="font-size: 2rem;">SCORE: 0</div>
            <div class="rank" id="rank-name">路人级</div>
            <p id="rank-desc">你只是个路过的观众...</p>
            <button class="opt-btn" onclick="location.reload()">重新进入循环</button>
        </div>
    </div>

    <div id="warning-bar">警告：前方存在大量怪异 警告：前方存在大量怪异</div>

<script>
    // 强制音效合成器（物语转场音效）
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if(type === 'click') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if(type === 'flash') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(110, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    const questions = [
        { q: "战场原黑仪在遇到历时，失去的是什么？", a: ["记忆", "重量", "声音", "痛觉"], c: 1 },
        { q: "忍野忍曾经的名字是？", a: ["姬丝秀忒", "琪雅丝黛", "索菲亚", "露米娅"], c: 0 },
        { q: "《伪物语》中，历与火怜进行的著名“活动”是？", a: ["打扑克", "刷牙", "赛跑", "捉迷藏"], c: 1 },
        { q: "八九寺真宵背后的背包里，标志性的图案是？", a: ["猫", "蜗牛", "熊", "兔子"], c: 2 },
        { q: "谁是所有怪异事件幕后的“非人类”策划者（影子）？", a: ["卧烟伊豆湖", "忍野扇", "贝木泥舟", "手折正弦"], c: 1 },
        { q: "羽川翼在《猫物语（白）》中最终接受了自己的哪部分？", a: ["压力", "嫉妒（苛虎）", "色欲", "愤怒"], c: 1 },
        { q: "千石抚子成为蛇神时，由于什么契机？", a: ["历的拒绝", "符咒", "喝了神酒", "吃了全知全能的药"], c: 1 },
        { q: "《恋物语》中，欺诈师贝木泥舟欺骗的对象是谁？", a: ["阿良良木历", "战场原黑仪", "千石抚子", "羽川翼"], c: 2 },
        { q: "《伤物语》中，历夺回姬丝秀忒四肢的顺序，最后一个人是？", a: ["德拉曼兹路基", "艾比索特", "奇洛金卡达", "忍野咩咩"], c: 2 },
        { q: "“我不无所不知，我只知道我知道的。”这句话的日语原版第一人称是？", a: ["私 (Watashi)", "僕 (Boku)", "俺 (Ore)", "あたし (Atashi)"], c: 0 }
    ];

    let current = 0;
    let score = 0;

    function flash(text, color, next) {
        const f = document.getElementById('flash-card');
        f.style.display = 'flex';
        f.style.background = color;
        f.style.color = color === '#000' ? '#fff' : '#000';
        f.innerText = text;
        playSound('flash');
        
        setTimeout(() => {
            f.style.display = 'none';
            if(next) next();
        }, 150);
    }

    function initQuiz() {
        playSound('click');
        document.getElementById('start-page').style.display = 'none';
        flash('第一题', '#be0000', () => {
            document.getElementById('quiz-page').style.display = 'block';
            showQuestion();
        });
    }

    function showQuestion() {
        const q = questions[current];
        document.getElementById('q-idx').innerText = (current + 1).toString().padStart(2, '0');
        document.getElementById('q-text').innerText = q.q;
        const container = document.getElementById('q-opts');
        container.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = opt;
            b.onclick = () => checkAnswer(i);
            container.appendChild(b);
        });
    }

    function checkAnswer(idx) {
        if(idx === questions[current].c) score++;
        playSound('click');
        current++;
        
        if(current < questions.length) {
            const titles = ["黑一分", "赤一分", "承", "转", "间幕"];
            const randomTitle = titles[Math.floor(Math.random()*titles.length)];
            const randomColor = Math.random() > 0.5 ? '#000' : '#be0000';
            flash(randomTitle, randomColor, showQuestion);
        } else {
            flash('终结', '#be0000', showResult);
        }
    }

    function showResult() {
        document.getElementById('quiz-page').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';
        document.getElementById('score-val').innerText = `正确数: ${score} / ${questions.length}`;
        
        const rank = document.getElementById('rank-name');
        const desc = document.getElementById('rank-desc');
        
        if(score === 10) {
            rank.innerText = "怪异之王";
            desc.innerText = "你是真正的阿良良木历，所有的怪异都在你的掌握之中。";
        } else if(score >= 7) {
            rank.innerText = "班长中的班长";
            desc.innerText = "虽然不是无所不知，但你知道的确实很多。";
        } else if(score >= 4) {
            rank.innerText = "迷路的蜗牛";
            desc.innerText = "你还在寻找真相的路上，多读读西尾维新吧。";
        } else {
            rank.innerText = "贝木的牺牲品";
            desc.innerText = "你完全被欺骗了，现在的你只是个路人而已。";
        }
    }
</script>
</body>
</html>
